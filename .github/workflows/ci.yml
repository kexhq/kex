name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgmp-dev libreadline-dev erlang-base libboost-context-dev

      - name: Build
        run: cmake -B build -G "Unix Makefiles" && cmake --build build

      - name: Unit tests
        run: make test

      - name: Spec suite
        run: make spec

  wasm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake

      # Pinned to 5.0.7 specifically — newer Emscripten (6.0.2 at the time
      # this was found) has a real regression where -sASYNCIFY combined with
      # -sNO_DISABLE_EXCEPTION_CATCHING hangs on the first
      # emscripten_fiber_swap call. See third_party/gmp-wasm/README.md's
      # "Emscripten version" section for the full writeup.
      - name: Cache emsdk
        id: cache-emsdk
        uses: actions/cache@v4
        with:
          path: emsdk
          key: emsdk-5.0.7

      - name: Install emsdk
        if: steps.cache-emsdk.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk && ./emsdk install 5.0.7 && ./emsdk activate 5.0.7

      # GMP built for wasm32 from source — no prebuilt wasm GMP exists via
      # Emscripten's port system or Homebrew, and third_party/gmp-wasm's
      # include/lib are gitignored (build artifacts, not vendored — see that
      # directory's README.md and CLAUDE.md's stance on not committing
      # generated binaries). Cached here since the build itself takes a
      # couple of minutes and never changes unless the GMP or Emscripten
      # version pin above changes.
      - name: Cache GMP-for-wasm
        id: cache-gmp-wasm
        uses: actions/cache@v4
        with:
          path: |
            third_party/gmp-wasm/include
            third_party/gmp-wasm/lib
          key: gmp-wasm-6.3.0-emsdk-5.0.7-v2

      - name: Build GMP for wasm
        if: steps.cache-gmp-wasm.outputs.cache-hit != 'true'
        run: |
          source emsdk/emsdk_env.sh
          # gmplib.org itself timed out connecting from GitHub's runners
          # (confirmed: curl hung ~135s then failed) — ftp.gnu.org mirrors
          # the same release and is far better CDN'd for CI traffic.
          curl -LO https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz
          tar xf gmp-6.3.0.tar.xz
          mkdir gmp-6.3.0/build-wasm && cd gmp-6.3.0/build-wasm
          emconfigure ../configure \
            --host=wasm32-unknown-emscripten \
            --build="$(../config.guess)" \
            --disable-assembly \
            --disable-shared \
            --enable-static \
            --enable-cxx \
            --prefix="${GITHUB_WORKSPACE}/third_party/gmp-wasm" \
            CC_FOR_BUILD=clang \
            CFLAGS="-O2"
          emmake make -j"$(nproc)"
          emmake make install

      - name: Configure and build wasm target
        run: |
          source emsdk/emsdk_env.sh
          make build-wasm

      - name: Wasm unit tests (via Node)
        run: make test-wasm

      # Pre-release only — no NPM_TOKEN needed, GITHUB_TOKEN can publish to
      # GitHub Packages directly. Every push overwrites what the `next`
      # dist-tag points to (a fresh 0.0.0-dev.<short-sha> version each
      # time); there is no `latest`/stable release yet — see
      # packages/kex/README.md. Skipped on pull_request builds so PRs from
      # forks (which don't get GITHUB_TOKEN write access) don't fail here.
      - name: Publish @kexhq/kex to GitHub Packages
        if: github.event_name == 'push'
        working-directory: packages/kex
        run: |
          npm version "0.0.0-dev.${GITHUB_SHA::7}" --no-git-tag-version
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm publish --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
