name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libreadline-dev

      - name: Unit tests
        run: make test

      - name: Spec tests
        run: make spec

      - name: Parse all examples
        run: make parse
